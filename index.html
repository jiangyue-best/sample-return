<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>样本回寄</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",sans-serif;
    background:#f4f7f5;
    color:#333;
    padding:20px;
}

.container{
    max-width:520px;
    margin:0 auto;
    background:#fff;
    border-radius:24px;
    padding:32px 24px;
    box-shadow:0 4px 20px rgba(0,0,0,0.08);
}

.logo{
    text-align:center;
    margin-bottom:20px;
}

.logo img{
    width:90px;
    height:90px;
    object-fit:contain;
}

.title{
    text-align:center;
    font-size:28px;
    font-weight:700;
    color:#1E8E5A;
    margin-bottom:12px;
}

.sub-title{
    text-align:center;
    font-size:15px;
    color:#666;
    margin-bottom:24px;
}

.copy-tip{
    background:#E8F7EE;
    color:#1E8E5A;
    padding:14px;
    border-radius:14px;
    text-align:center;
    font-size:15px;
    margin-bottom:24px;
    line-height:1.6;
}

.address-box{
    background:#f8f8f8;
    border-radius:18px;
    padding:22px;
    margin-bottom:24px;
}

.label{
    color:#999;
    font-size:14px;
    margin-bottom:8px;
}

.name{
    font-size:20px;
    font-weight:600;
    margin-bottom:6px;
}

.phone{
    font-size:18px;
    font-weight:600;
    margin-bottom:14px;
}

.address{
    line-height:1.8;
    font-size:16px;
}

.btn{
    width:100%;
    border:none;
    background:#1E8E5A;
    color:#fff;
    font-size:18px;
    font-weight:600;
    padding:18px;
    border-radius:16px;
    cursor:pointer;
    margin-bottom:18px;
}

.btn:active{
    opacity:0.9;
}

.copy-btn{
    width:100%;
    border:none;
    background:#ffffff;
    color:#1E8E5A;
    font-size:17px;
    font-weight:600;
    padding:16px;
    border-radius:16px;
    cursor:pointer;
    margin-bottom:22px;
    border:2px solid #1E8E5A;
}

.tips{
    background:#FFF8E8;
    border-radius:16px;
    padding:18px;
    line-height:1.9;
    color:#8A6D3B;
    font-size:14px;
}

.tips-title{
    font-size:16px;
    font-weight:700;
    margin-bottom:10px;
}

.footer{
    text-align:center;
    margin-top:24px;
    font-size:13px;
    color:#999;
    line-height:1.8;
}

</style>

</head>

<body>

<div class="container">

    <!-- LOGO -->
    <div class="logo">

        <!-- 替换成你的logo -->
        <!-- 没有logo可删除整行 -->
        <img src="logo.png" alt="LOGO">

    </div>

    <!-- 标题 -->
    <div class="title">
        样本回寄
    </div>

    <div class="sub-title">
        肠道菌群检测样本回寄
    </div>

    <!-- 自动复制提示 -->
    <div class="copy-tip" id="copyTip">
        回寄地址已自动复制<br>
        可直接粘贴到顺丰寄件
    </div>

    <!-- 地址 -->
    <div class="address-box">

        <div class="label">
            收件人
        </div>

        <div class="name">
            胡老师
        </div>

        <div class="phone">
            15201182406
        </div>

        <div class="label">
            回寄地址
        </div>

        <div class="address">
            北京市昌平区南邵镇双营西路79号院5号楼5层
        </div>

    </div>

    <!-- 打开顺丰 -->
    <button class="btn" onclick="openSF()">
        打开顺丰寄件
    </button>

    <!-- 手动复制 -->
    <button class="copy-btn" onclick="copyAddress()">
        点击复制回寄地址
    </button>

    <!-- 注意事项 -->
    <div class="tips">

        <div class="tips-title">
            注意事项
        </div>

        1、建议采样后当天寄出<br>
        2、推荐使用顺丰快递<br>
        3、请确保样本密封完整<br>
        4、请填写准确联系电话<br>
        5、建议选择上门取件

    </div>

    <div class="footer">
        感谢您的配合<br>
        祝您身体健康
    </div>

</div>

<script>

// 回寄地址
const addressText = `
胡老师
15201182406
北京市昌平区南邵镇双营西路79号院5号楼5层
`;


// 页面打开自动复制地址
window.onload = function(){

    navigator.clipboard.writeText(addressText)
    .then(() => {

        document.getElementById("copyTip").innerHTML =
        "回寄地址已自动复制<br>可直接粘贴到顺丰寄件";

    })
    .catch(() => {

        document.getElementById("copyTip").innerHTML =
        "请点击下方按钮复制回寄地址";

    });

};


// 手动复制地址
function copyAddress(){

    navigator.clipboard.writeText(addressText)
    .then(() => {

        alert("回寄地址已复制");

    })
    .catch(() => {

        prompt("请手动复制以下地址：", addressText);

    });

}


// 打开顺丰
function openSF(){

    const sfCode = '#小程序://顺丰速运+/Pr5Tq49JcD8USqF';

    navigator.clipboard.writeText(sfCode)
    .then(() => {

        alert(
`顺丰寄件入口已复制

请返回微信聊天界面
微信会自动识别并弹出顺丰小程序`
        );

    })
    .catch(() => {

        prompt(
'请手动复制以下内容到微信打开：',
sfCode
        );

    });

}

</script>

</body>
</html>
