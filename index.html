<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>样本回寄</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:-apple-system,BlinkMacSystemFont,"PingFang SC",
      "Helvetica Neue",Helvetica,Arial,sans-serif;
      background:#f4fbf8;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:20px;
      color:#1f2937;
    }

    .card{
      width:100%;
      max-width:420px;
      background:#ffffff;
      border-radius:24px;
      padding:32px 24px;
      box-shadow:0 10px 30px rgba(0,0,0,0.08);
    }

    .logo{
      width:72px;
      height:72px;
      margin:0 auto 18px;
      border-radius:20px;
      background:linear-gradient(135deg,#2ecc71,#27ae60);
      display:flex;
      justify-content:center;
      align-items:center;
      color:#fff;
      font-size:34px;
      font-weight:bold;
    }

    h1{
      text-align:center;
      font-size:28px;
      margin-bottom:10px;
      color:#14532d;
    }

    .desc{
      text-align:center;
      font-size:15px;
      line-height:1.7;
      color:#6b7280;
      margin-bottom:28px;
    }

    .address-box{
      background:#f0fdf4;
      border:1px solid #bbf7d0;
      border-radius:18px;
      padding:18px;
      margin-bottom:24px;
    }

    .address-title{
      font-size:16px;
      font-weight:700;
      margin-bottom:12px;
      color:#166534;
    }

    .address{
      line-height:1.9;
      font-size:15px;
      color:#374151;
      word-break:break-all;
    }

    .btn{
      width:100%;
      border:none;
      background:linear-gradient(135deg,#22c55e,#16a34a);
      color:#fff;
      height:54px;
      border-radius:16px;
      font-size:18px;
      font-weight:700;
      cursor:pointer;
      transition:0.2s;
      margin-bottom:14px;
    }

    .btn:active{
      transform:scale(0.98);
    }

    .copy-btn{
      background:#ecfdf5;
      color:#16a34a;
      border:1px solid #86efac;
    }

    .tips{
      margin-top:18px;
      font-size:13px;
      line-height:1.8;
      color:#6b7280;
      text-align:center;
    }

    .success{
      margin-top:14px;
      text-align:center;
      color:#16a34a;
      font-size:14px;
      display:none;
    }

    .phone-link{
      color:#16a34a;
      text-decoration:none;
      font-weight:600;
    }
  </style>
</head>

<body>

  <div class="card">

    <div class="logo">
      菌
    </div>

    <h1>样本回寄</h1>

    <div class="desc">
      请使用微信打开页面，点击下方按钮进入顺丰寄件。
    </div>

    <div class="address-box">

      <div class="address-title">
        回寄地址
      </div>

      <div class="address" id="addressText">
        胡老师<br>
        15201182406<br>
        北京市昌平区南邵镇双营西路79号院5号楼5层
      </div>

    </div>

    <!-- 顺丰按钮 -->
    <button class="btn" onclick="openSF()">
      一键打开顺丰寄件
    </button>

    <!-- 复制按钮 -->
    <button class="btn copy-btn" onclick="copyAddress()">
      复制回寄地址
    </button>

    <div class="success" id="successText">
      地址已复制
    </div>

    <div class="tips">
      若无法自动跳转，请在微信中打开页面。<br><br>

      联系电话：
      <a class="phone-link" href="tel:15201182406">
        15201182406
      </a>
    </div>

  </div>

  <script>

    // 顺丰小程序跳转
    function openSF() {

      // 你的顺丰小程序scheme
      const sfScheme =
      "#小程序://顺丰速运+/Pr5Tq49JcD8USqF";

      window.location.href = sfScheme;

      // 跳转失败提示
      setTimeout(() => {
        alert("若未成功打开，请在微信中访问本页面。");
      }, 2500);
    }

    // 复制地址
    function copyAddress() {

      const text =
`胡老师
15201182406
北京市昌平区南邵镇双营西路79号院5号楼5层`;

      navigator.clipboard.writeText(text).then(() => {

        document.getElementById("successText").style.display = "block";

        setTimeout(() => {
          document.getElementById("successText").style.display = "none";
        }, 2500);

      }).catch(() => {

        alert("复制失败，请手动复制。");

      });
    }

  </script>

</body>
</html>
